# ChatAIO macOS (Apple Silicon) 自动构建
# 触发方式: 在源码仓库发布 Release 时自动触发
# 产物: 将 dmg / zip / blockmap / latest-mac.yml 上传至 Kane-Kuroneko/ChatAIO-Releases
#
# ⚠️ 前置条件:
#   - 仓库 CainKane/Reaxes 必须为 public，或已在 repo secrets 中配置 PAT
#   - secrets.CHATAIO_RELEASES_TOKEN：可写 Kane-Kuroneko/ChatAIO-Releases 的 PAT（repo 权限）
#   - 如需代码签名，请在 repo secrets 中配置 Apple 证书（mac 自动更新通常需要签名）
#   - 若 Reaxes dist 已跟踪到 git 中，可移除 build-reaxes 步骤

name: ChatAIO macOS Release

on:
   release:
      types: [ published ]

permissions:
   contents: write

jobs:
   build-mac-arm64:
      runs-on: macos-latest

      steps:
         # ============================================================
         # 1. 检出代码
         # ============================================================
         - name: Checkout electron-reaxes-react
           uses: actions/checkout@v4
           with:
              path: electron-reaxes-react

         # electron-reaxes-react 依赖 file:../reaxes/xxx/dist
         # 这些 dist 产物未跟踪到 git 中，需先检出源码并构建
         - name: "Checkout Reaxes (file: dependency)"
           uses: actions/checkout@v4
           with:
              repository: CainKane/Reaxes
              path: reaxes

         # ============================================================
         # 2. 安装 Node.js
         # ============================================================
         - name: Setup Node.js 22
           uses: actions/setup-node@v4
           with:
              node-version: '22'

         # ============================================================
         # 3. 构建 Reaxes 依赖（dist 未入 git，需从源码构建）
         # ============================================================
         - name: Install & Build reaxes packages
           working-directory: ./reaxes
           run: |
              npm install
              npm run build reaxes
              npm run build reaxes-react
              npm run build reaxes-utils

         # ============================================================
         # 4. 安装主项目依赖
         # ============================================================
         - name: Install electron-reaxes-react dependencies
           working-directory: ./electron-reaxes-react
           run: yarn install --frozen-lockfile

         # ============================================================
         # 5. Webpack 构建（生成 Electron 可用的 dist）
         # ============================================================
         - name: Webpack build (ChatAIO production)
           working-directory: ./electron-reaxes-react
           run: yarn tsx scripts/webpack.build/index.ts ChatAIO production

         # ============================================================
         # 6. Electron-builder 打包（macOS arm64 dmg+zip，生成 latest-mac.yml）
         # ============================================================
         - name: Electron build (macOS arm64)
           working-directory: ./electron-reaxes-react
           run: yarn tsx scripts/electron.build/index.ts ChatAIO -- --mac --arm64 --publish never
           env:
              # macOS CI 环境默认无签名证书，关闭自动发现以避免构建中断
              # 注意：未签名时安装态 mac 自动更新可能失败
              CSC_IDENTITY_AUTO_DISCOVERY: false

         # ============================================================
         # 7. 上传产物至 ChatAIO-Releases（供 electron-updater）
         # ============================================================
         - name: Upload artifacts to ChatAIO-Releases
           uses: softprops/action-gh-release@v2
           with:
              repository: Kane-Kuroneko/ChatAIO-Releases
              tag_name: ${{ github.event.release.tag_name }}
              name: ${{ github.event.release.name || github.event.release.tag_name }}
              body: ${{ github.event.release.body }}
              files: |
                 electron-reaxes-react/projects/ChatAIO/__Bin/*.dmg
                 electron-reaxes-react/projects/ChatAIO/__Bin/*.zip
                 electron-reaxes-react/projects/ChatAIO/__Bin/*.blockmap
                 electron-reaxes-react/projects/ChatAIO/__Bin/latest-mac.yml
           env:
              GITHUB_TOKEN: ${{ secrets.CHATAIO_RELEASES_TOKEN }}
