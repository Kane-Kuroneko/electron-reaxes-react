{
	appId: "com.reaxes.chataio",
	productName: "ChatAIO",
	icon: "statics/gpt",
	directories: {
		output : "__Bin"
	},
	artifactName: "${productName}-${version}-${os}-${arch}.${ext}",
	electronUpdaterCompatibility: ">=2.16",
	publish: {
		provider: "github",
		owner: "Kane-Kuroneko",
		repo: "ChatAIO-Releases",
	},
	files: ["dist/"],
	extraResources: [
		{
			from: "statics",
			to: "statics"
		}
	],
	electronVersion: "41.10.2",
	asar: true,

	mac: {
		target: [
			{
				target: "dmg",
				arch: ["x64", "arm64"]
			},
			{
				target: "zip",
				arch: ["x64", "arm64"]
			}
		],
		category: "public.app-category.productivity",
	},

	win: {
		target: [
			{
				target: "nsis",
				arch: ["x64"]
			}
		],
	},

	linux: {
		target: [
			{
				target: "AppImage",
				arch: ["x64"]
			}
		],
	},
}
